name: Build VSIX

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Webpack build
        run: npm run webpack-build:extension
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: npx @vscode/vsce package --no-git-tag-version --no-update-package-json -o task-explorer-${{ steps.version.outputs.version }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-explorer-${{ steps.version.outputs.version }}
          path: '*.vsix'

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -n1)
          {
            echo "notes<<NOTES_EOF"
            echo "## Installation"
            echo ""
            echo "Download the \`.vsix\` file below and install in VS Code:"
            echo ""
            echo "\`\`\`"
            echo "code --install-extension task-explorer-${{ steps.version.outputs.version }}.vsix"
            echo "\`\`\`"
            echo ""
            echo "Or use **Extensions: Install from VSIX...** from the Command Palette."
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}"
            else
              git log --pretty=format:"- %s" -20
            fi
            echo ""
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Task Explorer ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: '*.vsix'
          draft: false
          prerelease: false
